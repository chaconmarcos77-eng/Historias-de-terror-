# Historias-de-terror-
Básicamente aca pueden poner sus historias y leer las demás que publiquen saludos 
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historias de Terror</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #eee;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #222;
      padding: 1rem;
      text-align: center;
    }
    header h1 {
      color: #f33;
      margin: 0;
    }
    main {
      padding: 1rem;
      max-width: 800px;
      margin: auto;
    }
    .story {
      background-color: #222;
      border: 1px solid #333;
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 8px;
    }
    .story h3 {
      color: #f33;
      margin-top: 0;
    }
    form {
      background-color: #222;
      padding: 1rem;
      border: 1px solid #333;
      border-radius: 8px;
      margin-bottom: 2rem;
    }
    input, textarea, button {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
      border-radius: 4px;
      border: none;
    }
    button {
      background-color: #f33;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background-color: #d00;
    }
  </style>
</head>
<body>
  <header>
    <h1>Historias de Terror</h1>
    <p>Escribe tu historia y comparte el miedo</p>
  </header>
  <main>
    <form id="storyForm">
      <h2>Sube tu historia</h2>
      <input type="text" id="author" placeholder="Tu nombre" required>
      <input type="text" id="title" placeholder="Título de la historia" required>
      <textarea id="content" rows="5" placeholder="Escribe tu historia aquí..." required></textarea>
      <button type="submit">Enviar historia</button>
    </form>

    <div id="storiesContainer">
      <h2>Historias recientes</h2>
      <!-- Las historias aparecerán aquí -->
    </div>
  </main>

  <script>
    const form = document.getElementById('storyForm');
    const container = document.getElementById('storiesContainer');

    // Función para crear la historia en HTML
    function addStory(author, title, content) {
      const div = document.createElement('div');
      div.classList.add('story');
      div.innerHTML = `<h3>${title}</h3><p><strong>${author}</strong></p><p>${content}</p>`;
      container.appendChild(div);
    }

    // Manejar envío del formulario
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const author = document.getElementById('author').value;
      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;

      addStory(author, title, content);

      form.reset();
    });
  </script>
</body>
</html>
